name: Hisse Listesi Güncelle

on:
  schedule:
    # Her gün 05:00 UTC = 08:00 TRT (borsa açılmadan önce)
    - cron: "0 5 * * *"
  workflow_dispatch:  # Elle de çalıştırılabilir

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Hisse listesini güncelle
        run: python scripts/fetch_bist_tickers.py

      - name: Değişiklik varsa commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bist-tickers.json
          if git diff --staged --quiet; then
            echo "Değişiklik yok, commit atlandı"
          else
            git commit -m "Tickers güncellendi: $(TZ='Europe/Istanbul' date '+%d.%m.%Y')"
            git push
          fi
